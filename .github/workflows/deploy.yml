name: Deploy Kwora Bots

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        working-directory: functions
        run: npm install
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SA_KEY }}' > "$GITHUB_WORKSPACE/sa-key.json"
      - name: Deploy
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/sa-key.json
        run: firebase deploy --only functions --project kwora-massanger --non-force
      - name: Cleanup
        if: always()
        run: rm -f "$GITHUB_WORKSPACE/sa-key.json"
